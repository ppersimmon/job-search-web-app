<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Увійти - JobSearch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="main-header">
    <div class="logo-wrapper">
        <a href="/" class="logo">Job<span>Search</span></a>
    </div>

    <div class="auth-buttons">
        <a href="/register" class="btn-primary">Реєстрація</a>
    </div>
</header>

<main>
    <div class="auth-container">
        <h1>З поверненням!</h1>
        <p class="subtitle">Увійдіть у свій акаунт, щоб продовжити пошук</p>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="email">Електронна пошта</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary btn-search btn-block">Увійти</button>
        </form>

        <div class="auth-links">
            Немає акаунту? <a href="/register">Створити зараз</a>
        </div>
    </div>
</main>

<footer>
    <div class="logo" style="margin-bottom: 10px;">Job<span>Search</span></div>
    <p>© 2026 Всі права захищені.</p>
</footer>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
