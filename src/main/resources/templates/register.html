<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - JobSearch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="main-header">
    <div class="logo-wrapper">
        <a href="/" class="logo">Job<span>Search</span></a>
    </div>

    <div class="auth-buttons">
        <a href="/login" class="btn-outline">Увійти</a>
    </div>
</header>

<main>
    <div class="auth-container" style="margin-top: 40px; margin-bottom: 40px;">
        <h1>Створіть акаунт</h1>
        <p class="subtitle">Приєднуйтесь до нас та знаходьте найкращі вакансії</p>

        <form action="/register" method="post">
            <div class="form-group">
                <label for="name">Ім'я та прізвище</label>
                <input type="text" id="name" name="name" placeholder="Іван Іваненко" required>
            </div>

            <div class="form-group">
                <label for="email">Електронна пошта</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Створіть надійний пароль" required>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Підтвердження пароля</label>
                <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="Повторіть пароль" required>
            </div>

            <button type="submit" class="btn-primary btn-search btn-block">Зареєструватися</button>
        </form>

        <div class="auth-links">
            Вже є акаунт? <a href="/login">Увійти</a>
        </div>
    </div>
</main>

<footer>
    <div class="logo" style="margin-bottom: 10px;">Job<span>Search</span></div>
    <p>© 2026 Всі права захищені.</p>
</footer>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
