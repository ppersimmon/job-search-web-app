<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - JobSearch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="main-header">
    <div class="logo-wrapper">
        <a href="/" class="logo">Job<span>Search</span></a>
    </div>

    <div class="auth-buttons">
        <a href="/login" class="btn-outline">Увійти</a>
    </div>
</header>

<main>
    <div class="auth-container" style="margin-top: 40px; margin-bottom: 40px;">
        <h1>Створіть акаунт</h1>
        <p class="subtitle">Приєднуйтесь до нас та знаходьте найкращі вакансії</p>

        <div th:if="${error}" style="color: #d9534f; background: #fdf7f7; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #d9534f;" th:text="${error}">
            Помилка реєстрації
        </div>

        <form th:action="@{/register}" method="post" th:object="${userDto}">
            <div class="form-group">
                <label for="name">Ім'я та прізвище</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Іван Іваненко">
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: #d9534f; font-size: 13px; margin-top: 5px; display: block;"></span>
            </div>

            <div class="form-group">
                <label for="email">Електронна пошта</label>
                <input type="text" id="email" th:field="*{email}" placeholder="name@example.com">
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: #d9534f; font-size: 13px; margin-top: 5px; display: block;"></span>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" th:field="*{password}" placeholder="Створіть надійний пароль">
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: #d9534f; font-size: 13px; margin-top: 5px; display: block;"></span>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Підтвердження пароля</label>
                <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" placeholder="Повторіть пароль">
                <span th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}" style="color: #d9534f; font-size: 13px; margin-top: 5px; display: block;"></span>
            </div>

            <button type="submit" class="btn-primary btn-search btn-block">Зареєструватися</button>
        </form>

        <div class="auth-links">
            Вже є акаунт? <a href="/login">Увійти</a>
        </div>
    </div>
</main>

<footer>
    <div class="logo" style="margin-bottom: 10px;">Job<span>Search</span></div>
    <p>© 2026 Всі права захищені.</p>
</footer>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
